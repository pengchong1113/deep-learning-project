<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; margin-bottom: 2.5rem; }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: #8b8fa8; margin-top: 0.5rem; font-size: 1rem; }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      width: 100%;
      max-width: 960px;
    }
    @media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }

    /* ── Upload area ── */
    .upload-box {
      border: 2px dashed #2e3550;
      border-radius: 16px;
      padding: 2.5rem 1rem;
      text-align: center;
      color: #8b8fa8;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-box:hover { border-color: #7b2ff7; }
    .upload-box .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .upload-box input[type="file"] { display: none; }

    video {
      width: 100%;
      border-radius: 12px;
      margin-top: 1rem;
      background: #000;
    }

    .btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Results panel ── */
    .results-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8b8fa8;
      text-align: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }
    .placeholder .icon { font-size: 3rem; }

    .result-card {
      background: linear-gradient(135deg, #1a1f2e, #252b3b);
      border: 1px solid #2e3550;
      border-radius: 16px;
      padding: 1.8rem;
      text-align: center;
    }
    .result-emoji { font-size: 3.5rem; }
    .result-action {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 0.3rem;
    }

    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .metric-card {
      background: #1a1f2e;
      border: 1px solid #2e3550;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
    }
    .metric-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b8fa8;
      margin-bottom: 0.3rem;
    }
    .metric-value { font-size: 1.8rem; font-weight: 700; color: #00d4ff; }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8b8fa8;
      margin-bottom: 0.5rem;
    }
    .prob-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.55rem;
    }
    .prob-label { font-size: 0.88rem; color: #c0c4d6; width: 130px; flex-shrink: 0; }
    .prob-label.top { color: #fff; font-weight: 600; }
    .prob-bar-bg {
      flex: 1;
      background: #1a1f2e;
      border-radius: 99px;
      height: 7px;
      overflow: hidden;
    }
    .prob-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      transition: width 0.4s ease;
    }
    .prob-pct { font-size: 0.82rem; color: #8b8fa8; width: 38px; text-align: right; }

    .spinner {
      border: 3px solid #2e3550;
      border-top-color: #00d4ff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #2a1a1a;
      border: 1px solid #7f2020;
      border-radius: 10px;
      padding: 1rem;
      color: #ff6b6b;
      font-size: 0.9rem;
    }

    /* ── Mode tabs ── */
    .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .mode-tab {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid #2e3550;
      border-radius: 10px;
      background: #1a1f2e;
      color: #8b8fa8;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-tab.active {
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: #fff;
      border-color: transparent;
    }

    /* ── Record area ── */
    .camera-placeholder {
      border: 2px dashed #2e3550;
      border-radius: 16px;
      padding: 2.5rem 1rem;
      text-align: center;
      color: #8b8fa8;
    }
    .camera-placeholder .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

    .btn-stop { background: linear-gradient(90deg, #ff4d4d, #c0392b); }

    .rec-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: #ff6b6b;
      font-weight: 600;
    }
    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4d4d;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>💪 Fitness Assistant</h1>
    <p>Upload a workout video — AI identifies the exercise and counts your reps</p>
  </div>

  <div class="layout">

    <!-- Left: input -->
    <div>
      <div class="mode-tabs">
        <button class="mode-tab active" id="uploadTab">📁 Upload</button>
        <button class="mode-tab" id="recordTab">🎥 Record</button>
      </div>

      <div id="uploadMode">
        <label class="upload-box" id="uploadBox">
          <input type="file" id="fileInput" accept="video/*" />
          <div class="icon">🎬</div>
          <div>Click to upload a video</div>
          <div style="font-size:0.8rem; margin-top:0.3rem;">MP4 · AVI · MOV · MKV</div>
        </label>
      </div>

      <div id="recordMode" style="display:none;">
        <div class="camera-placeholder" id="cameraPlaceholder">
          <div class="icon">📷</div>
          <div>Click "Start Camera" to begin</div>
        </div>
        <div class="record-controls">
          <button class="btn" id="startCameraBtn">Start Camera</button>
          <button class="btn" id="recordBtn" style="display:none;">⏺ Start Recording</button>
          <button class="btn btn-stop" id="stopBtn" style="display:none;">⏹ Stop Recording</button>
          <button class="btn" id="recordAgainBtn" style="display:none;">🔁 Record Again</button>
        </div>
        <div class="rec-indicator" id="recIndicator" style="display:none;">
          <span class="rec-dot"></span> <span id="recTimer">0:00</span>
        </div>
      </div>

      <video id="videoPreview" controls playsinline style="display:none;"></video>

      <button class="btn" id="analyzeBtn" disabled>Analyze</button>
    </div>

    <!-- Right: results -->
    <div class="results-panel" id="resultsPanel">
      <div class="placeholder">
        <div class="icon">📊</div>
        <div>Results will appear here</div>
      </div>
    </div>

  </div>

  <script>
    const fileInput   = document.getElementById('fileInput');
    const uploadBox   = document.getElementById('uploadBox');
    const videoEl     = document.getElementById('videoPreview');
    const analyzeBtn  = document.getElementById('analyzeBtn');
    const resultsPanel = document.getElementById('resultsPanel');

    const uploadTab         = document.getElementById('uploadTab');
    const recordTab         = document.getElementById('recordTab');
    const uploadMode        = document.getElementById('uploadMode');
    const recordMode        = document.getElementById('recordMode');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const startCameraBtn    = document.getElementById('startCameraBtn');
    const recordBtn         = document.getElementById('recordBtn');
    const stopBtn           = document.getElementById('stopBtn');
    const recordAgainBtn    = document.getElementById('recordAgainBtn');
    const recIndicator      = document.getElementById('recIndicator');
    const recTimerEl        = document.getElementById('recTimer');

    const ACTION_EMOJI = {
      squat: '🏋️', pushup: '💪', situp: '🤸', pullup: '🙌',
      jumping_jacks: '⭐', jump_rope: '🪢', bench_press: '🏋️', clean_and_jerk: '🥇'
    };

    let selectedFile     = null;
    let cameraStream     = null;
    let mediaRecorder    = null;
    let recordedChunks   = [];
    let recTimerInterval = null;
    let recSeconds       = 0;

    function resetResults() {
      resultsPanel.innerHTML = '<div class="placeholder"><div class="icon">📊</div><div>Results will appear here</div></div>';
    }

    function stopCameraStream() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
    }

    // ── Mode tabs ────────────────────────────────────────────────────────────
    function switchMode(mode) {
      const toUpload = mode === 'upload';
      uploadTab.classList.toggle('active', toUpload);
      recordTab.classList.toggle('active', !toUpload);
      uploadMode.style.display = toUpload ? 'block' : 'none';
      recordMode.style.display = toUpload ? 'none' : 'block';

      if (toUpload) {
        stopCameraStream();
        clearInterval(recTimerInterval);
      }
    }

    uploadTab.addEventListener('click', () => switchMode('upload'));
    recordTab.addEventListener('click', () => {
      if (!navigator.mediaDevices || !window.MediaRecorder) {
        resultsPanel.innerHTML = '<div class="error">Your browser does not support webcam recording. Try Chrome, Firefox, or Edge.</div>';
        return;
      }
      switchMode('record');
    });

    // ── Upload flow ──────────────────────────────────────────────────────────
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;
      videoEl.srcObject = null;
      videoEl.muted = false;
      videoEl.controls = true;
      videoEl.src = URL.createObjectURL(file);
      videoEl.style.display = 'block';
      analyzeBtn.disabled = false;
      resetResults();
    });

    // ── Record flow ──────────────────────────────────────────────────────────
    startCameraBtn.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
      } catch (err) {
        resultsPanel.innerHTML = '<div class="error">Could not access camera — check browser permissions.</div>';
        return;
      }
      cameraPlaceholder.style.display = 'none';
      videoEl.srcObject = cameraStream;
      videoEl.muted = true;
      videoEl.controls = false;
      videoEl.style.display = 'block';
      videoEl.play();

      startCameraBtn.style.display = 'none';
      recordBtn.style.display = 'inline-block';
    });

    recordBtn.addEventListener('click', () => {
      recordedChunks = [];
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
        ? 'video/webm;codecs=vp8'
        : 'video/webm';
      mediaRecorder = new MediaRecorder(cameraStream, { mimeType });

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        stopCameraStream();
        clearInterval(recTimerInterval);
        recIndicator.style.display = 'none';

        const blob = new Blob(recordedChunks, { type: mimeType });
        selectedFile = new File([blob], 'recording.webm', { type: mimeType });

        videoEl.srcObject = null;
        videoEl.muted = false;
        videoEl.controls = true;
        videoEl.src = URL.createObjectURL(blob);

        analyzeBtn.disabled = false;
        stopBtn.style.display = 'none';
        recordAgainBtn.style.display = 'inline-block';
        resetResults();
      };

      mediaRecorder.start();
      recSeconds = 0;
      recTimerEl.textContent = '0:00';
      recIndicator.style.display = 'flex';
      recTimerInterval = setInterval(() => {
        recSeconds++;
        const m = Math.floor(recSeconds / 60);
        const s = String(recSeconds % 60).padStart(2, '0');
        recTimerEl.textContent = `${m}:${s}`;
      }, 1000);

      recordBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
    });

    stopBtn.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    });

    recordAgainBtn.addEventListener('click', () => {
      recordAgainBtn.style.display = 'none';
      startCameraBtn.style.display = 'inline-block';
      cameraPlaceholder.style.display = 'block';
      videoEl.style.display = 'none';
      videoEl.src = '';
      selectedFile = null;
      analyzeBtn.disabled = true;
      resetResults();
    });

    // ── Analyze (shared by upload + record flows) ─────────────────────────────
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      analyzeBtn.disabled = true;
      resultsPanel.innerHTML = '<div class="spinner"></div>';

      const form = new FormData();
      form.append('file', selectedFile);

      try {
        const res = await fetch('/predict', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          resultsPanel.innerHTML = `<div class="error">Error: ${data.detail || 'Unknown error'}</div>`;
          return;
        }

        const action = data.action;
        const emoji  = ACTION_EMOJI[action] || '🏃';
        const label  = action.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const conf   = (data.confidence * 100).toFixed(0) + '%';
        const reps   = data.reps ?? 0;

        const sorted = Object.entries(data.probabilities)
          .sort((a, b) => b[1] - a[1]);

        const bars = sorted.map(([lbl, prob], i) => {
          const name = lbl.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          const pct  = (prob * 100).toFixed(0);
          return `
            <div class="prob-row">
              <span class="prob-label ${i === 0 ? 'top' : ''}">${name}</span>
              <div class="prob-bar-bg">
                <div class="prob-bar-fill" style="width:${pct}%"></div>
              </div>
              <span class="prob-pct">${pct}%</span>
            </div>`;
        }).join('');

        resultsPanel.innerHTML = `
          <div class="result-card">
            <div class="result-emoji">${emoji}</div>
            <div class="result-action">${label}</div>
          </div>
          <div class="metrics">
            <div class="metric-card">
              <div class="metric-label">Confidence</div>
              <div class="metric-value">${conf}</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Reps Counted</div>
              <div class="metric-value">${reps}</div>
            </div>
          </div>
          <div>
            <div class="section-label">All predictions</div>
            ${bars}
          </div>`;

      } catch (err) {
        resultsPanel.innerHTML = `<div class="error">Connection error — make sure the backend is running.</div>`;
      } finally {
        analyzeBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
